<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPTV Pro | Sports Center</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' http: https:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' http: https: data: blob:; connect-src 'self' http: https:; media-src 'self' http: https: blob:; object-src 'none'; base-uri 'self';"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Inherited Variables */
      :root {
        --bg-dark: #000000;
        --bg-card: #0a0a0a;
        --bg-panel: #050505;
        --accent: #ffffff;
        --accent-dim: #404040;
        --border-light: #262626;
        --success: #00ff9d;
        --warning: #ffb700;
        --error: #ff3333;
        --text-main: #ffffff;
        --text-secondary: #a3a3a3;
        --text-muted: #525252;
        --font-main: "Inter", sans-serif;
        --font-display: "Rajdhani", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --sidebar-width: 280px;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: var(--font-main);
        background-color: var(--bg-dark);
        background-image: 
            linear-gradient(to right, #0a0a0a 1px, transparent 1px),
            linear-gradient(to bottom, #0a0a0a 1px, transparent 1px);
        background-size: 40px 40px;
        color: var(--text-main);
        height: 100vh;
        overflow: hidden;
      }

      /* Layout */
      .layout {
        display: grid;
        grid-template-columns: var(--sidebar-width) 1fr;
        height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        background: var(--bg-panel);
        border-right: 1px solid var(--border-light);
        display: flex;
        flex-direction: column;
        padding: 24px 0;
      }

      .brand {
        padding: 0 24px 24px;
        font-family: var(--font-display);
        font-size: 24px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-main);
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid var(--border-light);
      }

      .nav-menu {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      .menu-header {
        font-size: 11px;
        text-transform: uppercase;
        color: var(--text-muted);
        font-weight: 700;
        letter-spacing: 1px;
        margin: 16px 8px 8px;
        font-family: var(--font-mono);
      }

      .nav-item {
        width: 100%;
        text-align: left;
        padding: 12px 16px;
        border: none;
        background: transparent;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        border-radius: 4px;
        transition: all 0.2s;
        margin-bottom: 2px;
        font-family: var(--font-main);
      }

      .nav-item:hover {
        background: var(--bg-card);
        color: var(--text-main);
      }

      .nav-item.active {
        background: var(--bg-card);
        color: var(--text-main);
        border-left: 2px solid var(--accent);
      }

      .nav-item img {
        width: 20px;
        height: 20px;
        object-fit: contain;
      }

      .back-btn {
        margin: 0 16px 16px;
        padding: 12px;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--border-light);
        color: var(--text-main);
        cursor: pointer;
        border-radius: 4px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.2s;
      }
      .back-btn:hover { background: var(--bg-card); border-color: var(--accent); }

      /* Main Content */
      .main {
        overflow-y: auto;
        padding: 32px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 32px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--border-light);
      }

      .title h1 {
        font-family: var(--font-display);
        font-size: 36px;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .title p { color: var(--text-muted); font-size: 14px; }

      .tabs {
        display: flex;
        gap: 8px;
        background: var(--bg-panel);
        padding: 4px;
        border-radius: 4px;
        border: 1px solid var(--border-light);
      }

      .tab {
        padding: 8px 24px;
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 600;
        border-radius: 2px;
        transition: all 0.2s;
      }

      .tab.active {
        background: var(--bg-card);
        color: var(--text-main);
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
      }

      /* Match Grid */
      .match-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 16px;
      }
      
      .match-card {
        background: var(--bg-card);
        border: 1px solid var(--border-light);
        border-radius: 4px;
        padding: 20px;
        position: relative;
        transition: all 0.2s;
        cursor: pointer;
      }

      .match-card:hover {
        border-color: var(--accent-dim);
        transform: translateY(-2px);
      }

      .match-status {
        position: absolute;
        top: 12px;
        right: 12px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        padding: 2px 6px;
        border-radius: 2px;
        background: rgba(255,255,255,0.05);
        color: var(--text-muted);
        font-family: var(--font-mono);
      }

      .match-status.live {
        background: rgba(0, 255, 157, 0.1);
        color: var(--success);
        animation: pulse 2s infinite;
      }

      .teams {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 12px;
      }

      .team {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        width: 100px;
        text-align: center;
      }

      .team img {
        width: 48px;
        height: 48px;
        object-fit: contain;
      }

      .team-name {
        font-size: 13px;
        font-weight: 600;
        line-height: 1.2;
      }

      .score-board {
        text-align: center;
      }

      .score {
        font-family: var(--font-display);
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 2px;
      }

      .match-time {
        font-size: 12px;
        color: var(--text-muted);
        font-family: var(--font-mono);
        margin-top: 4px;
      }

      /* Standings Table */
      .standings-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      .standings-table th {
        text-align: left;
        padding: 12px;
        color: var(--text-muted);
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        border-bottom: 1px solid var(--border-light);
      }

      .standings-table td {
        padding: 12px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }

      .standings-table tr:hover td {
        background: rgba(255,255,255,0.02);
      }

      .table-team {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      
      .table-team img { width: 24px; height: 24px; }

      /* Modals/Loading */
      .loading {
        text-align: center;
        padding: 40px;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }

      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
      }

      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="brand">
          <span>⚽ Sports Hub</span>
        </div>

        <button class="back-btn" onclick="window.location.href='iptv-pro-player.html'">
          <span>← Back to Player</span>
        </button>

        <nav class="nav-menu" id="leagueNav">
          <div class="menu-header">Top Leagues</div>
          <button class="nav-item active" onclick="app.loadCompetition('premierleague')">
            <img src="https://crests.football-data.org/PL.png" onerror="this.style.display='none'"> Premier League
          </button>
          <button class="nav-item" onclick="app.loadCompetition('laliga')">
            <img src="https://crests.football-data.org/PD.png" onerror="this.style.display='none'"> La Liga
          </button>
          <button class="nav-item" onclick="app.loadCompetition('bundesliga')">
             <img src="https://crests.football-data.org/BL1.png" onerror="this.style.display='none'"> Bundesliga
          </button>
          <button class="nav-item" onclick="app.loadCompetition('seriea')">
             <img src="https://crests.football-data.org/SA.png" onerror="this.style.display='none'"> Serie A
          </button>
          <button class="nav-item" onclick="app.loadCompetition('ligue1ubereats')">
             <img src="https://crests.football-data.org/FL1.png" onerror="this.style.display='none'"> Ligue 1
          </button>
          <button class="nav-item" onclick="app.loadCompetition('championsleague')">
             <img src="https://crests.football-data.org/CL.png" onerror="this.style.display='none'"> Champions League
          </button>
        </nav>
      </aside>

      <!-- Main -->
      <main class="main">
        <header class="header">
          <div class="title">
            <h1 id="pageTitle">Premier League</h1>
            <p>Live Scores & Standings</p>
          </div>
          <div class="tabs">
            <button class="tab active" onclick="app.switchTab('matches', this)">Matches</button>
            <button class="tab" onclick="app.switchTab('standings', this)">Standings</button>
          </div>
        </header>

        <div id="contentArea">
           <!-- Injected Content -->
        </div>
      </main>
    </div>

    <script>
      // API CONFIG
      const API_BASE = 'http://localhost:8000/api/football'; // Fully qualified local proxy
      const CACHE_KEY = 'iptv_sports_data';
      
      // Utils
      const Utils = {
        read: (key) => localStorage.getItem(key),
        store: (key, val) => localStorage.setItem(key, val),
        formatDate: (iso) => {
            const d = new Date(iso);
            return d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
      };

      class SportsApp {
        constructor() {
           this.token = Utils.read('football_api_key') || '';
           // If no token, we might fail unless server has one.
           this.currentComp = 'PL';
           this.currentTab = 'matches';
           
           this.init();
        }

        init() {
            // Check if page is opened directly from file system
            if (window.location.protocol === 'file:') {
                document.getElementById('contentArea').innerHTML = `
                    <div class="loading" style="color:var(--warning)">
                        <h3>⚠️ Server Required</h3>
                        <p style="margin-top:12px">Sports Center requires the Python server to fetch live data.</p>
                        <p style="margin-top:8px; font-size:12px; color:var(--text-muted)">
                           1. Open a terminal in the IPTV PLAYER folder<br>
                           2. Run: <code style="background:#1a1a1a; padding:2px 6px;">python server.py</code><br>
                           3. Open: <a href="http://localhost:8000/sports-center.html" style="color:var(--success)">http://localhost:8000/sports-center.html</a>
                        </p>
                    </div>
                `;
                return;
            }

            if (!this.token) {
                // Try to warn user? For now assume it might work via server key if implemented
                console.warn("No Football API Key found in settings");
            }
            this.loadCompetition('premierleague');
        }

        async loadCompetition(code) {
            this.currentComp = code;
            
            // Update Title
            const map = {
                'premierleague': 'Premier League', 'laliga': 'La Liga', 'bundesliga': 'Bundesliga', 
                'seriea': 'Serie A', 'ligue1ubereats': 'Ligue 1', 'championsleague': 'Champions League'
            };
            document.getElementById('pageTitle').innerText = map[code] || code;

            // Update Nav State
            document.querySelectorAll('.nav-item').forEach(b => {
                b.classList.remove('active');
                if(b.innerText.includes(map[code])) b.classList.add('active');
            });

            this.render();
        }

        switchTab(tab, btn) {
            this.currentTab = tab;
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.render();
        }

        async render() {
            const container = document.getElementById('contentArea');
            container.innerHTML = '<div class="loading">Loading data...</div>';

            try {
                if (this.currentTab === 'matches') {
                    const data = await this.fetchData(`/${this.currentComp}/fixtures/`);
                    // Use the response field from RapidAPI
                    const matches = this.filterMatches(data.response || []);
                    this.renderMatches(matches);
                } else {
                    const data = await this.fetchData(`/${this.currentComp}/table`);
                    this.renderStandings(data.response || []);
                }
            } catch (err) {
                container.innerHTML = `<div class="loading" style="color:var(--error)">Error: ${err.message}<br><small>Check if server.py is running and API Key is set.</small></div>`;
            }
        }

        filterMatches(matches) {
            // Logic to show only relevant matches (e.g. Matchday)
            // Ideally we find the "current" matchday
            // Simple approach: Show last 5 finished and next 10 scheduled
            const now = new Date();
            const past = matches.filter(m => new Date(m.utcDate) < now).slice(-6).reverse(); // Last 6
            const future = matches.filter(m => new Date(m.utcDate) >= now).slice(0, 10);
            return [...past, ...future]; // Simple concatenated list
        }

        renderMatches(matches) {
            const container = document.getElementById('contentArea');
            container.innerHTML = '<div class="match-grid"></div>';
            const grid = container.querySelector('.match-grid');

            matches.forEach(item => {
                const m = item.fixture || item; // Handle RapidAPI structure
                const teams = item.teams || m.teams;
                const goals = item.goals || m.goals;
                
                const isLive = m.status.short === 'LIVE' || m.status.short === '1H' || m.status.short === '2H';
                const date = new Date(m.date || m.utcDate).toLocaleDateString() + ' ' + Utils.formatDate(m.date || m.utcDate);
                
                const card = document.createElement('div');
                card.className = 'match-card';
                card.innerHTML = `
                   <div class="match-status ${isLive ? 'live' : ''}">${isLive ? 'LIVE' : m.status.short || m.status}</div>
                   <div class="match-time">${date}</div>
                   <div class="teams">
                      <div class="team">
                         <img src="${teams.home.logo || teams.home.crest}" alt="${teams.home.name}">
                         <div class="team-name">${teams.home.name}</div>
                      </div>
                      <div class="score-board">
                         <div class="score">
                            ${goals.home ?? '-'} : ${goals.away ?? '-'}
                         </div>
                      </div>
                      <div class="team">
                         <img src="${teams.away.logo || teams.away.crest}" alt="${teams.away.name}">
                         <div class="team-name">${teams.away.name}</div>
                      </div>
                   </div>
                `;
                grid.appendChild(card);
            });
        }

        renderStandings(table) {
             const container = document.getElementById('contentArea');
             let html = `
                <table class="standings-table">
                   <thead>
                      <tr>
                         <th>Pos</th>
                         <th>Team</th>
                         <th>P</th>
                         <th>W</th>
                         <th>D</th>
                         <th>L</th>
                         <th>GF</th>
                         <th>GA</th>
                         <th>Pts</th>
                      </tr>
                   </thead>
                   <tbody>
             `;
             
             table.forEach(row => {
                 const team = row.team || row;
                 html += `
                    <tr>
                       <td>${row.rank || row.position}</td>
                       <td>
                          <div class="table-team">
                             <img src="${team.logo || team.crest}">
                             <span>${team.name || team.shortName}</span>
                          </div>
                       </td>
                       <td>${row.all?.played || row.playedGames}</td>
                       <td>${row.all?.win || row.won}</td>
                       <td>${row.all?.draw || row.draw}</td>
                       <td>${row.all?.lose || row.lost}</td>
                       <td>${row.all?.goals?.for || row.goalsFor}</td>
                       <td>${row.all?.goals?.against || row.goalsAgainst}</td>
                       <td style="font-weight:700; color:var(--success)">${row.points}</td>
                    </tr>
                 `;
             });
             
             html += '</tbody></table>';
             container.innerHTML = html;
        }

        async fetchData(endpoint) {
           const headers = {};
           if (this.token) headers['X-Auth-Token'] = this.token;

           const res = await fetch(API_BASE + endpoint, { headers });
           if (!res.ok) throw new Error(res.statusText);
           return res.json();
        }
      }

      const app = new SportsApp();
      
    </script>
  </body>
</html>
